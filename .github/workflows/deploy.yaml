on:
  push:
    branches-ignore:
      - 'dependabot/**'

permissions:
  actions: read
  contents: read
  security-events: write
  packages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: navikt/tsm-workflows/actions/gradle/test@main

  build:
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' || startsWith(github.ref_name, 'dev')
    steps:
      - uses: actions/checkout@v6
      - uses: navikt/tsm-workflows/actions/gradle/build@main
        id: build
        with:
          app: "regulus-maximus"
          team: "tsm"
          salsa: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      image: ${{ steps.build.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}

  sbom:
    name: Upload SBOM for build
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: navikt/tsm-workflows/actions/attest-sign@main
        with:
          image: ${{ needs.build.outputs.image }}
          digest: ${{ needs.build.outputs.digest }}
          team: tsm

  deploy-dev:
    if: github.ref_name == 'main' || startsWith(github.ref_name, 'dev')
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: "dev-gcp"
          RESOURCE: ".nais/nais-dev.yaml"
          WORKLOAD_IMAGE: ${{ needs.build.outputs.image }}
          VAR: sourceVersionURL=https://github.com/${{ github.repository }}/tree/${{ github.sha }}

  deploy-prod:
    if: github.ref_name == 'main'
    needs: [build, test, deploy-dev]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: "prod-gcp"
          RESOURCE: ".nais/nais-prod.yaml"
          WORKLOAD_IMAGE: ${{ needs.build.outputs.image }}
          VAR: sourceVersionURL=https://github.com/${{ github.repository }}/tree/${{ github.sha }}

  security:
    name: Security
    secrets: inherit
    permissions:
      contents: read
      id-token: write
      security-events: write
    needs: build
    uses: navikt/tsm-workflows/.github/workflows/security.yaml@main
    with:
      image: ${{ needs.build.outputs.image }}
